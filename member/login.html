<!-- Hero -->
<section class="page-hero">
  <div class="container">
    <h1><i class="fas fa-sign-in-alt mr-2"></i>로그인</h1>
    <p class="page-sub">eduroam 서비스에 오신 것을 환영합니다</p>
  </div>
</section>

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="section-card shadow-lg p-5">
        <div class="text-center mb-4">
          <h2 class="font-weight-bold" style="color: #0056b3;">LOGIN</h2>
          <p class="text-muted small">eduroam 서비스에 오신 것을 환영합니다</p>
        </div>
        <form>
          <div class="form-group mb-4">
            <label class="small font-weight-bold">아이디</label>
            <input type="text" class="form-control form-control-lg border-0 bg-light" placeholder="ID@기관도메인">
          </div>
          <div class="form-group mb-4">
            <label class="small font-weight-bold">비밀번호</label>
            <input type="password" class="form-control form-control-lg border-0 bg-light" placeholder="Password">
          </div>
          <div class="custom-control custom-checkbox mb-4">
            <input type="checkbox" class="custom-control-input" id="rememberMe">
            <label class="custom-control-label small" for="rememberMe">아이디 저장</label>
          </div>
          <button type="submit" class="btn btn-primary btn-lg btn-block shadow-sm mb-4">로그인</button>
        </form>
        <div class="text-center border-top pt-4">
          <a href="{{ '/member/join.html' | relative_url }}" class="small text-muted mr-3">회원가입</a>
