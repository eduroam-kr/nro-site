<style>
  #cb-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #0056b3, #003d82);
    color: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,86,179,0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.35rem;
    z-index: 9000;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  #cb-toggle:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 22px rgba(0,86,179,0.55);
  }
  #cb-panel {
    position: fixed;
    bottom: 92px;
    right: 24px;
    width: 340px;
    max-height: 480px;
    border-radius: 16px;
    background: #fff;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    z-index: 9000;
    overflow: hidden;
    transform: scale(0.92) translateY(12px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.22s, transform 0.22s;
  }
  #cb-panel.cb-open {
    opacity: 1;
    transform: scale(1) translateY(0);
    pointer-events: auto;
  }
  .cb-header {
    background: linear-gradient(135deg, #0056b3, #003d82);
    color: #fff;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .cb-header-title {
    font-size: 0.93rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cb-close {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 1rem;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
    transition: color 0.15s;
  }
  .cb-close:hover { color: #fff; }
  .cb-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 13px 8px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #f8f9fc;
  }
  .cb-msg {
    max-width: 88%;
    font-size: 0.84rem;
    line-height: 1.6;
    border-radius: 12px;
    padding: 9px 13px;
    word-break: break-word;
  }
  .cb-msg.bot {
    background: #fff;
    color: #1e293b;
    border: 1px solid #e2e8f0;
    align-self: flex-start;
    border-bottom-left-radius: 3px;
  }
  .cb-msg.user {
    background: #0056b3;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 3px;
  }
  .cb-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
    font-size: 0.79rem;
    font-weight: 600;
    color: #0056b3;
    text-decoration: none;
    background: #e8f0fe;
    padding: 5px 11px;
    border-radius: 20px;
    align-self: flex-start;
    transition: background 0.15s;
  }
  .cb-link:hover { background: #d0e2ff; text-decoration: none; color: #003d82; }
  .cb-input-area {
    padding: 10px 12px;
    border-top: 1px solid #e2e8f0;
    display: flex;
    gap: 8px;
    background: #fff;
    flex-shrink: 0;
  }
  #cb-input {
    flex: 1;
    border: 1px solid #d1d5db;
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 0.84rem;
    outline: none;
    transition: border-color 0.15s;
    font-family: inherit;
    background: #fff;
    color: #1e293b;
  }
  #cb-input:focus { border-color: #0056b3; }
  #cb-send {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #0056b3;
    color: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.88rem;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #cb-send:hover { background: #003d82; }

  /* 다크 모드 */
  [data-theme='dark'] #cb-panel { background: #1e293b; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
  [data-theme='dark'] .cb-messages { background: #0f172a; }

  [data-theme='dark'] #cb-input:focus { border-color: #60a5fa; }

    :root:not([data-theme='light']) .cb-link { background: #1e3050; color: #93c5fd; }
  }
  @media (max-width: 480px) {
    #cb-panel { width: calc(100vw - 28px); right: 14px; bottom: 84px; }

  function match(text) {
    var t = text.toLowerCase().replace(/\s+/g, '');
    for (var i = 0; i < intents.length; i++) {
      var kws = intents[i].kw;
      for (var j = 0; j < kws.length; j++) {
        if (t.indexOf(kws[j].toLowerCase().replace(/\s+/g, '')) !== -1) {
          return intents[i];
        }
      }
    }
    return null;
  }

  function scrollToBottom() {
    var msgs = document.getElementById('cb-messages');
    msgs.scrollTop = msgs.scrollHeight;
  }

  function addMsg(text, type) {
    var msgs = document.getElementById('cb-messages');
    var div = document.createElement('div');
    div.className = 'cb-msg ' + type;
    div.textContent = text;
    msgs.appendChild(div);
    scrollToBottom();
    return div;
  }

  function addLink(link, linkText) {
    var msgs = document.getElementById('cb-messages');
    var a = document.createElement('a');
    a.className = 'cb-link';
    a.href = BASE + link;
    a.innerHTML = '<i class="fas fa-arrow-right" style="font-size:0.72rem;"></i> ' + linkText;
    msgs.appendChild(a);
    scrollToBottom();
  }

  function reply(userText) {
    var intent = match(userText);
    setTimeout(function () {
      if (intent) {
        addMsg(intent.answer, 'bot');
        if (intent.link) addLink(intent.link, intent.linkText);
      } else {
        addMsg('죄송해요, 잘 이해하지 못했습니다. 더 자세한 문의는 아래 지원 페이지를 이용해 주세요.', 'bot');
        addLink('/support/', '지원 페이지 가기');
      }
    }, 300);
  }

  function send() {
    var input = document.getElementById('cb-input');
    var text = input.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    input.value = '';
    reply(text);
  }

      var isOpen = panel.classList.toggle('cb-open');
      toggle.innerHTML = isOpen
        ? '<i class="fas fa-times"></i>'
        : '<i class="fas fa-comment-dots"></i>';
      if (isOpen) input.focus();
    });

    closeBtn.addEventListener('click', function () {
      panel.classList.remove('cb-open');
      toggle.innerHTML = '<i class="fas fa-comment-dots"></i>';
    });

    sendBtn.addEventListener('click', send);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') send();
    });
  });
})();
</script>
