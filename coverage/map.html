      <li class="breadcrumb-item active text-dark" aria-current="page">eduroam 맵</li>

      <div class="col-md-5 mb-2 mb-md-0">
        <div class="input-group">
          <div class="input-group-prepend">
            <span class="input-group-text bg-white border-right-0"><i class="fas fa-search text-muted"></i></span>
          </div>

<style>
.leaflet-popup-content-wrapper { border-radius: 10px; padding: 0; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
.leaflet-popup-content { margin: 0; min-width: 210px !important; }
.map-popup-card { padding: 14px 16px; }
.map-popup-name { font-weight: 700; font-size: 0.95rem; color: #1a4f8a; margin-bottom: 3px; }
.map-popup-campus { font-size: 0.85rem; color: #1a6fd4; margin-bottom: 6px; }
.map-popup-addr { font-size: 0.8rem; color: #777; line-height: 1.5; margin-bottom: 6px; }
.map-popup-ap { font-size: 0.78rem; color: #555; }
.marker-cluster-small { background-color: rgba(110,170,240,0.6); }
.marker-cluster-small div { background-color: rgba(60,130,220,0.7); color:#fff; font-weight:700; }
.marker-cluster-medium { background-color: rgba(80,150,230,0.6); }
.marker-cluster-medium div { background-color: rgba(40,110,200,0.7); color:#fff; font-weight:700; }
.marker-cluster-large { background-color: rgba(40,100,200,0.6); }
.marker-cluster-large div { background-color: rgba(20,80,170,0.7); color:#fff; font-weight:700; }
@keyframes marker-pulse {
  0%   { transform: scale(1);   opacity: 0.6; }
  70%  { transform: scale(2.5); opacity: 0; }
  100% { transform: scale(2.5); opacity: 0; }
}
.marker-pulse-ring {
  position: absolute; top: 0; left: 0;
  width: 18px; height: 18px;
  background: #1a6fd4;
  border-radius: 50%;
  animation: marker-pulse 1.6s ease-out infinite;
}
</style>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
(function() {
  var campuses = {{ site.data.map_campuses | jsonify }};

  var map = L.map('eduroam-map').setView([36.3, 127.8], 7);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18
  }).addTo(map);

  var markerIcon = L.divIcon({
    className: '',
    html: '<div style="width:12px;height:12px;background:#1a6fd4;border:2.5px solid #fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,0.35);"></div>',
    iconSize: [12, 12],
    iconAnchor: [6, 6],
    popupAnchor: [0, -8]
  });

  var searchIcon = L.divIcon({
    className: '',
    html: '<div style="position:relative;width:18px;height:18px;">' +
          '<div class="marker-pulse-ring"></div>' +
          '<div style="position:absolute;top:0;left:0;width:18px;height:18px;background:#1a6fd4;border:2.5px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>' +
          '</div>',
    iconSize: [18, 18],
    iconAnchor: [9, 9],
    popupAnchor: [0, -10]
  });

  var cluster = L.markerClusterGroup({
    maxClusterRadius: 45,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true
  });

  var allMarkers = [];

  campuses.forEach(function(c) {
    var apHtml = c.num_ap > 0
      ? '<div class="map-popup-ap"><i class="fas fa-wifi mr-1" style="color:#1a6fd4;"></i>AP ' + c.num_ap.toLocaleString() + '개</div>'
      : '';
    var addrHtml = c.addr_ko
      ? '<div class="map-popup-addr"><i class="fas fa-map-marker-alt mr-1"></i>' + c.addr_ko + '</div>'
      : '';

    var popup =
      '<div class="map-popup-card">' +
      '<div class="map-popup-name">' + c.name_ko + '</div>' +
      '<div class="map-popup-campus">' + c.campus_ko + '</div>' +
      addrHtml + apHtml +
      '</div>';

    var marker = L.marker([c.lat, c.lng], { icon: markerIcon })
      .bindTooltip(c.name_ko, { direction: 'top', offset: [0, -6] })
      .bindPopup(popup);
    marker._data = c;
    cluster.addLayer(marker);
    allMarkers.push(marker);
  });

  map.addLayer(cluster);
  document.getElementById('markerCount').textContent = campuses.length;

  document.getElementById('mapSearch').addEventListener('input', filterMarkers);

  function filterMarkers() {
    var q = document.getElementById('mapSearch').value.trim().toLowerCase();
    cluster.clearLayers();
    var filtered = allMarkers.filter(function(m) {
      if (!q) return true;
      var d = m._data;
      return d.name_ko.toLowerCase().includes(q) || d.campus_ko.toLowerCase().includes(q);
    });
    allMarkers.forEach(function(m) { m.setIcon(markerIcon); });
    if (q) filtered.forEach(function(m) { m.setIcon(searchIcon); });
    filtered.forEach(function(m) { cluster.addLayer(m); });
    document.getElementById('markerCount').textContent = filtered.length;
    if (q && filtered.length > 0) {
      var bounds = L.latLngBounds(filtered.map(function(m) { return m.getLatLng(); }));
      map.fitBounds(bounds, { maxZoom: 14, padding: [50, 50] });
    }
  }

  window.clearSearch = function() {
    document.getElementById('mapSearch').value = '';
    filterMarkers();
  };

  window.resetMap = function() {
    document.getElementById('mapSearch').value = '';
    cluster.clearLayers();
    allMarkers.forEach(function(m) { cluster.addLayer(m); });
    document.getElementById('markerCount').textContent = campuses.length;
    map.setView([36.3, 127.8], 7);
  };
})();
</script>
