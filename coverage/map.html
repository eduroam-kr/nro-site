<style>
  .leaflet-popup-content-wrapper { border-radius: 8px; padding: 0; overflow: hidden; }
  .leaflet-popup-content { margin: 0; width: 220px !important; }
  .map-popup-card { padding: 15px; }
  .map-popup-header { font-weight: 700; font-size: 1.05rem; color: #0056b3; margin-bottom: 5px; }
  .map-popup-addr { font-size: 0.85rem; color: #666; line-height: 1.4; }
  .marker-cluster-small { background-color: rgba(181, 226, 140, 0.6); }
  .marker-cluster-small div { background-color: rgba(110, 204, 57, 0.6); }
  .marker-cluster-medium { background-color: rgba(241, 211, 87, 0.6); }
  .marker-cluster-medium div { background-color: rgba(240, 194, 12, 0.6); }
  .marker-cluster-large { background-color: rgba(253, 156, 115, 0.6); }
  .marker-cluster-large div { background-color: rgba(241, 128, 23, 0.6); }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    var map = L.map('eduroam-map').setView([36.3, 127.8], 7);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    var markers = L.markerClusterGroup();

    if (typeof eduroamInstitutions !== 'undefined') {
      eduroamInstitutions.forEach(function(inst) {
        var marker = L.marker([inst.lat, inst.lng]);
        
        var popupContent = `
          <div class="map-popup-card">
            <div class="map-popup-header">${inst.name}</div>
            <div class="map-popup-addr">${inst.addr}</div>
            ${inst.link ? `<a href="${inst.link}" target="_blank" class="btn btn-xs btn-success mt-2 text-white" style="font-size:0.75rem; padding: 2px 8px;"><i class="fas fa-external-link-alt mr-1"></i> 접속 안내 바로가기</a>` : `<span class="badge badge-secondary mt-2">안내 링크 준비중</span>`}
          </div>
        `;

        marker.bindTooltip(inst.name, { direction: 'top' });
        marker.bindPopup(popupContent);
        markers.addLayer(marker);
      });
    }

    map.addLayer(markers);
  });
</script>
